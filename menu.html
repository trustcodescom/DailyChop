                <div>
                    <a href="menu.html" class="order-now-header">Order Now!</a>
                </div>
            </div>
        </div>
        <div class="overlay" id="overlay"></div>

    <main>
        <!-- Hero Section(SLIDE SHOW) -->
        <section id="home" class="hero">
            <div class="hero-bg-container hero-menu">
                <div id="intro" class="menu-intro">
                    <h1 class="reveal-left">Order Now</h1>
                    <p>
                        Your favorite Nigerian meals, now just a few clicks away.
                        Browse, customize, and enjoy — hot, fresh, and home-style.
                    </p>

                    <div class="hero-buttons menu-btn">
                        <a href="menu.html" class="btn btn-primary">Order Now</a>
                    </div>
                </div>
            </div>
        </section>
        <section class="menu-section">
            <div class="menu-container">
                <div class="menu-header">
                    <div class="menu-heading">
                        <h1>Explore Our Menu</h1>
                        <p>Delicious meals made fresh, just for you.</p>
                    </div>
                    <div class="download-menu">
                        <a href="file/DailyChop_Menu.pdf">
                            <i class="fa-solid fa-download"></i>
                            Download Menu
                        </a>
                    </div>
                </div>

                <div class="menu-search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="search" placeholder="Search for meals...">
                </div>

                <div class="menu-categories">

                    <button class="active">
                        <i class="fa-solid fa-border-all"></i>
                        All
                    </button>

                    <button>
                        <i class="fa-solid fa-bowl-rice"></i>
                        Rice
                    </button>

                    <button>
                        <i class="fa-solid fa-bowl-food"></i>
                        Swallow
                    </button>

                    <button>
                        <i class="fa-solid fa-utensils"></i>
                        Soups
                    </button>

                    <button>
                        <i class="fa-solid fa-drumstick-bite"></i>
                        Chicken
                    </button>

                    <button>
                        <i class="fa-solid fa-fish"></i>
                        Fish
                    </button>
                    <button>
                        <i class="fa-solid fa-glass-water"></i>
                        Drinks
                    </button>
                </div>
            </div>
            <section class="menu-grid" id="menuGrid"></section>
                
            </div>
        </section>

    </main>
